<nav class="nav" aria-label="Primary navigation">
  {% if current_user %}
    <div class="nav-links">
      <a class="{% if request.endpoint == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">Dashboard</a>
      <a class="{% if request.endpoint in ['projects', 'project_detail', 'new_project', 'edit_project'] %}active{% endif %}" href="{{ url_for('projects') }}">Projects</a>
      <a class="{% if request.endpoint == 'feedback' %}active{% endif %}" href="{{ url_for('feedback') }}">Feedback</a>
      {% if current_user.role == 'admin' %}
        <a class="{% if request.endpoint == 'admin' %}active{% endif %}" href="{{ url_for('admin') }}">Admin Control</a>
      {% endif %}
    </div>
    <div class="nav-session">
      <span class="user-chip" title="Signed in as {{ current_user.username }}">
        <span class="user-avatar" aria-hidden="true">{{ current_user.username[:1]|upper }}</span>
        <span class="user-meta">
          <span class="user-name">{{ current_user.username }}</span>
          <span class="user-role">{{ current_user.role }}</span>
        </span>
      </span>
      <a class="button ghost button-compact" href="{{ url_for('logout') }}">Sign out</a>
    </div>
  {% else %}
    <div class="nav-links public-links">
      <a class="{% if request.endpoint == 'login' %}active{% endif %}" href="{{ url_for('login') }}">Sign in</a>
      <a class="button button-compact" href="{{ url_for('register') }}">Request access</a>
    </div>
  {% endif %}
</nav>
