name: SAST — Static Application Security Testing

on:
  push:
    branches: [main, "Priority-Fixes", "claude/**", "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  bandit:
    name: Bandit Python Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (JSON report)
        run: |
          bandit -r app/ -f json -o bandit-results.json || true

      - name: Run Bandit (human-readable output)
        run: |
          echo "=== Bandit Security Scan Results ==="
          bandit -r app/

      - name: Quality gate — fail on HIGH or CRITICAL findings
        run: |
          python - <<'EOF'
          import json, sys
          with open("bandit-results.json") as f:
              data = json.load(f)
          high_or_critical = [
              r for r in data.get("results", [])
              if r.get("issue_severity", "").upper() in ("HIGH", "CRITICAL")
          ]
          if high_or_critical:
              print(f"QUALITY GATE FAILED: {len(high_or_critical)} HIGH/CRITICAL finding(s):")
              for r in high_or_critical:
                  print(f"  [{r['issue_severity']}] {r['test_id']} — {r['filename']}:{r['line_number']} — {r['issue_text']}")
              sys.exit(1)
          print("Quality gate passed: no HIGH or CRITICAL Bandit findings.")
          EOF

      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-results
          path: bandit-results.json

  semgrep:
    name: Semgrep Pattern Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (JSON report)
        run: |
          semgrep --config=auto \
                  --exclude-rule python.django.security.django-no-csrf-token.django-no-csrf-token \
                  --json \
                  --output=semgrep-results.json \
                  app/ || true
        env:
          # Optional: set SEMGREP_APP_TOKEN for higher rate limits
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Run Semgrep (human-readable output)
        run: |
          echo "=== Semgrep Scan Results ==="
          semgrep --config=auto \
                  --exclude-rule python.django.security.django-no-csrf-token.django-no-csrf-token \
                  app/ || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Quality gate — fail on ERROR severity findings
        run: |
          python - <<'EOF'
          import json, sys
          try:
              with open("semgrep-results.json") as f:
                  data = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              print("No Semgrep JSON output found — skipping quality gate.")
              sys.exit(0)
          blocking = [
              r for r in data.get("results", [])
              if r.get("extra", {}).get("severity", "").upper() in ("ERROR", "WARNING")
          ]
          if blocking:
              print(f"QUALITY GATE FAILED: {len(blocking)} ERROR/WARNING Semgrep finding(s):")
              for r in blocking:
                  sev = r.get("extra", {}).get("severity", "?")
                  path = r.get("path", "?")
                  line = r.get("start", {}).get("line", "?")
                  msg = r.get("extra", {}).get("message", "")[:120]
                  print(f"  [{sev}] {path}:{line} — {msg}")
              sys.exit(1)
          print("Quality gate passed: no ERROR/WARNING Semgrep findings.")
          EOF

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  trufflehog:
    name: TruffleHog Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for secret scanning

      # - name: Skip TruffleHog if BASE == HEAD # prevents false positives on new branches with no changes
      #   if: ${{ github.event.before == github.sha }}
      #   run: echo "Skipping TruffleHog: BASE and HEAD are the same."

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before || github.event.repository.default_branch || 'main' }}
          head: ${{ github.sha }}
          extra_args: --config .trufflehog.yml --only-verified=false
        # TruffleHog exits non-zero when verified secrets are found; treat as blocking
